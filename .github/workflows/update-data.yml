name: Update Data
on:
  schedule:
    - cron: '0 3 * * 1-5'  # Run at 3am UTC Monday-Friday
  workflow_dispatch:  # Allow manual triggering
 
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for git push and gh release commands
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install polars requests
 
      - name: Run data update script
        id: update
        run: |
          python main.py
          echo "new_quarter=$(cat last_known_quarter.txt)" >> $GITHUB_OUTPUT
 
      - name: Create new release with updated data
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.update.outputs.new_quarter }} \
            hogar_data.zip individual_data.zip \
            --title "EPH Data ${{ steps.update.outputs.new_quarter }}" \
            --notes "EPH data updated through ${{ steps.update.outputs.new_quarter }}." \
            --latest
 
      - name: Commit and push last known quarter
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet && git diff --staged --quiet || \
            (git add last_known_quarter.txt && \
             git commit -m "Update last known quarter to ${{ steps.update.outputs.new_quarter }}" && \
             git push)
